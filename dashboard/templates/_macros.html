{% macro status_badge(status) -%}
{% if status == "COMPLIANT" %}
<span class="inline-flex items-center rounded-full bg-green-100 px-2.5 py-0.5 text-xs font-medium text-green-800">✓ COMPLIANT</span>
{% elif status == "BREACH" %}
<span class="inline-flex items-center rounded-full bg-red-100 px-2.5 py-0.5 text-xs font-medium text-red-800">✗ BREACH</span>
{% else %}
<span class="inline-flex items-center rounded-full bg-amber-100 px-2.5 py-0.5 text-xs font-medium text-amber-800">⚠ ERROR</span>
{% endif %}
{%- endmacro %}
